aid: government-accountability-office
name: Government Accountability Office
description: >-
  The Government Accountability Office (GAO) is the United States government's
  supreme audit institution. It provides Congress with auditing, evaluation, and
  investigative services, and publishes reports, testimonies, and other products
  examining federal programs and policies.
